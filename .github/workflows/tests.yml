name: tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/tests.yml'
      - 'phpunit.xml'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
      - 'rector.php'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    branches:
      - main
    paths:
      - '**.php'
      - 'phpunit.xml'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
      - 'rector.php'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rector:
    name: Rector
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor/
          key: vendor-${{ hashFiles('composer.lock') }}

      - uses: ramsey/composer-install@v3

      - uses: actions/cache@v4
        with:
          path: .rector.cache
          key: rector-${{ hashFiles('src/**/*.php', 'tests/**/*.php') }}
          restore-keys: rector-

      - name: Get changed PHP files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'src/**/*.php' 'tests/**/*.php' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1...HEAD -- 'src/**/*.php' 'tests/**/*.php' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          [ -z "$FILES" ] && echo "empty=true" >> $GITHUB_OUTPUT || echo "empty=false" >> $GITHUB_OUTPUT

      - name: Run Rector
        if: steps.changed.outputs.empty == 'false'
        run: vendor/bin/rector --dry-run ${{ steps.changed.outputs.files }}

  pint:
    name: Pint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor/
          key: vendor-${{ hashFiles('composer.lock') }}

      - uses: ramsey/composer-install@v3

      - uses: actions/cache@v4
        with:
          path: .pint.cache
          key: pint-${{ hashFiles('src/**/*.php', 'tests/**/*.php') }}
          restore-keys: pint-

      - name: Get changed PHP files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- 'src/**/*.php' 'tests/**/*.php' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1...HEAD -- 'src/**/*.php' 'tests/**/*.php' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          [ -z "$FILES" ] && echo "empty=true" >> $GITHUB_OUTPUT || echo "empty=false" >> $GITHUB_OUTPUT

      - name: Run Pint
        if: steps.changed.outputs.empty == 'false'
        run: echo ${{ steps.changed.outputs.files }} | xargs vendor/bin/pint --test

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor/
          key: vendor-${{ hashFiles('composer.lock') }}

      - uses: ramsey/composer-install@v3

      - uses: actions/cache@v4
        with:
          path: .phpstan.cache
          key: phpstan-${{ hashFiles('src/**/*.php') }}
          restore-keys: phpstan-

      - name: Run PHPStan
        run: vendor/bin/phpstan --error-format=github

  tests:
    name: Tests - PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [rector, pint, phpstan]

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor/
          key: vendor-${{ matrix.php }}-${{ hashFiles('composer.lock') }}

      - uses: ramsey/composer-install@v3

      - uses: actions/cache@v4
        with:
          path: .phpunit.cache
          key: phpunit-${{ matrix.php }}-${{ hashFiles('src/**/*.php', 'tests/**/*.php') }}
          restore-keys: phpunit-${{ matrix.php }}-

      - name: Run tests
        run: vendor/bin/phpunit --no-coverage

  summary:
    name: Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [rector, pint, phpstan, tests]
    if: always()

    steps:
      - name: All checks passed
        if: ${{ needs.rector.result == 'success' && needs.pint.result == 'success' && needs.phpstan.result == 'success' && needs.tests.result == 'success' }}
        run: echo "All checks passed"

      - name: Some checks failed
        if: ${{ needs.rector.result != 'success' || needs.pint.result != 'success' || needs.phpstan.result != 'success' || needs.tests.result != 'success' }}
        run: exit 1
